<!DOCTYPE html>
<html>
<head>
  <title>Icon Generator</title>
</head>
<body>
  <canvas id="canvas16" width="16" height="16"></canvas>
  <canvas id="canvas48" width="48" height="48"></canvas>
  <canvas id="canvas128" width="128" height="128"></canvas>
  <script>
    function drawIcon(ctx, size) {
      // Background gradient
      const gradient = ctx.createLinearGradient(0, 0, size, size);
      gradient.addColorStop(0, '#667eea');
      gradient.addColorStop(1, '#764ba2');
      
      // Rounded rectangle background
      const radius = size * 0.15;
      ctx.beginPath();
      ctx.moveTo(radius, 0);
      ctx.lineTo(size - radius, 0);
      ctx.quadraticCurveTo(size, 0, size, radius);
      ctx.lineTo(size, size - radius);
      ctx.quadraticCurveTo(size, size, size - radius, size);
      ctx.lineTo(radius, size);
      ctx.quadraticCurveTo(0, size, 0, size - radius);
      ctx.lineTo(0, radius);
      ctx.quadraticCurveTo(0, 0, radius, 0);
      ctx.closePath();
      ctx.fillStyle = gradient;
      ctx.fill();
      
      // Marker/pencil icon (simplified)
      ctx.fillStyle = 'white';
      ctx.globalAlpha = 0.9;
      
      const s = size / 128; // scale factor
      
      // Pencil body
      ctx.beginPath();
      ctx.moveTo(35 * s, 90 * s);
      ctx.lineTo(55 * s, 70 * s);
      ctx.lineTo(95 * s, 30 * s);
      ctx.lineTo(105 * s, 40 * s);
      ctx.lineTo(65 * s, 80 * s);
      ctx.lineTo(45 * s, 100 * s);
      ctx.closePath();
      ctx.fill();
      
      // Highlight line
      ctx.globalAlpha = 0.7;
      ctx.fillStyle = '#ffff00';
      ctx.fillRect(25 * s, 100 * s, 45 * s, 10 * s);
      
      // Sticky note
      ctx.globalAlpha = 0.95;
      ctx.fillStyle = '#fff9c4';
      ctx.fillRect(68 * s, 52 * s, 42 * s, 42 * s);
      ctx.fillStyle = '#f9a825';
      ctx.fillRect(68 * s, 52 * s, 42 * s, 12 * s);
      
      ctx.globalAlpha = 1;
    }
    
    [16, 48, 128].forEach(size => {
      const canvas = document.getElementById('canvas' + size);
      const ctx = canvas.getContext('2d');
      drawIcon(ctx, size);
      
      // Download link
      const link = document.createElement('a');
      link.download = 'icon' + size + '.png';
      link.href = canvas.toDataURL('image/png');
      document.body.appendChild(document.createTextNode('icon' + size + ': '));
      document.body.appendChild(link);
      link.textContent = 'Download';
      document.body.appendChild(document.createElement('br'));
    });
  </script>
</body>
</html>
