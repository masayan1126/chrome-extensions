<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800">
  <defs>
    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="shadowSmall" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background - solid dark -->
  <rect width="1280" height="800" fill="#0a0a0a"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="100" x2="1280" y2="100" stroke="white" stroke-width="1"/>
    <line x1="0" y1="200" x2="1280" y2="200" stroke="white" stroke-width="1"/>
    <line x1="0" y1="300" x2="1280" y2="300" stroke="white" stroke-width="1"/>
    <line x1="0" y1="400" x2="1280" y2="400" stroke="white" stroke-width="1"/>
    <line x1="0" y1="500" x2="1280" y2="500" stroke="white" stroke-width="1"/>
    <line x1="0" y1="600" x2="1280" y2="600" stroke="white" stroke-width="1"/>
    <line x1="0" y1="700" x2="1280" y2="700" stroke="white" stroke-width="1"/>
  </g>

  <!-- Main Title -->
  <text x="640" y="90" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="52" font-weight="700" fill="white" letter-spacing="1">
    Web Annotator
  </text>
  <text x="640" y="130" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="20" fill="rgba(255,255,255,0.5)">
    Highlight text &amp; add sticky notes to any webpage
  </text>

  <!-- Browser mockup -->
  <g filter="url(#shadow)">
    <!-- Browser window frame -->
    <rect x="100" y="180" width="720" height="520" rx="12" fill="#1a1a1a"/>
    <!-- Browser header -->
    <rect x="100" y="180" width="720" height="40" rx="12" fill="#2a2a2a"/>
    <rect x="100" y="208" width="720" height="12" fill="#2a2a2a"/>
    <!-- Traffic lights -->
    <circle cx="125" cy="200" r="6" fill="#ff5f57"/>
    <circle cx="147" cy="200" r="6" fill="#febc2e"/>
    <circle cx="169" cy="200" r="6" fill="#28c840"/>
    <!-- URL bar -->
    <rect x="200" y="190" width="420" height="20" rx="4" fill="#1a1a1a"/>
    <text x="215" y="204" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.4)">example.com/article</text>

    <!-- Page content area -->
    <rect x="120" y="240" width="680" height="440" fill="#121212"/>

    <!-- Article content -->
    <text x="150" y="290" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="22" font-weight="600" fill="rgba(255,255,255,0.9)">Understanding Web Technologies</text>

    <!-- Paragraph with highlight -->
    <text x="150" y="340" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="rgba(255,255,255,0.6)">The modern web has evolved significantly over the past decade.</text>
    <rect x="150" y="358" width="380" height="22" rx="2" fill="#fef08a" opacity="0.35"/>
    <text x="150" y="373" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="rgba(255,255,255,0.9)">JavaScript frameworks have revolutionized development</text>
    <text x="150" y="398" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="rgba(255,255,255,0.6)">enabling complex applications to run in the browser.</text>

    <!-- Green highlight -->
    <rect x="150" y="428" width="280" height="22" rx="2" fill="#86efac" opacity="0.35"/>
    <text x="150" y="443" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="rgba(255,255,255,0.9)">CSS Grid and Flexbox provide layouts</text>
    <text x="150" y="468" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="rgba(255,255,255,0.6)">that were previously impossible without hacks.</text>

    <!-- Blue highlight -->
    <rect x="150" y="498" width="320" height="22" rx="2" fill="#93c5fd" opacity="0.35"/>
    <text x="150" y="513" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="rgba(255,255,255,0.9)">Progressive Web Apps blur the line</text>
    <text x="150" y="538" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="rgba(255,255,255,0.6)">between native and web applications.</text>

    <!-- Red highlight -->
    <rect x="150" y="568" width="260" height="22" rx="2" fill="#fca5a5" opacity="0.35"/>
    <text x="150" y="583" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="rgba(255,255,255,0.9)">WebAssembly opens new doors</text>
    <text x="150" y="608" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="rgba(255,255,255,0.6)">for high-performance web applications.</text>

    <!-- Sticky note on the page -->
    <g filter="url(#shadowSmall)">
      <rect x="560" y="300" width="200" height="130" rx="8" fill="#1e1e1e"/>
      <rect x="560" y="300" width="200" height="28" rx="8" fill="#2a2a2a"/>
      <rect x="560" y="320" width="200" height="8" fill="#2a2a2a"/>
      <text x="575" y="320" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" font-weight="500" fill="rgba(255,255,255,0.9)">Note</text>
      <text x="745" y="320" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="rgba(255,255,255,0.4)">x</text>
      <text x="575" y="360" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="rgba(255,255,255,0.7)">Important concept!</text>
      <text x="575" y="382" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="rgba(255,255,255,0.7)">Review this section</text>
      <text x="575" y="404" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="rgba(255,255,255,0.7)">for the exam.</text>
    </g>
  </g>

  <!-- Popup mockup -->
  <g filter="url(#shadow)" transform="translate(880, 180)">
    <!-- Popup frame -->
    <rect x="0" y="0" width="300" height="480" rx="12" fill="#121212"/>

    <!-- Header -->
    <rect x="0" y="0" width="300" height="60" rx="12" fill="#1a1a1a"/>
    <rect x="0" y="40" width="300" height="20" fill="#1a1a1a"/>
    <text x="20" y="35" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="16" font-weight="600" fill="rgba(255,255,255,0.9)">Web Annotator</text>
    <text x="20" y="52" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">example.com/article</text>

    <!-- Tabs -->
    <rect x="15" y="75" width="130" height="32" rx="6" fill="rgba(255,255,255,0.08)"/>
    <text x="45" y="95" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="rgba(255,255,255,0.9)">Highlights</text>
    <rect x="115" y="83" width="22" height="16" rx="8" fill="rgba(255,255,255,0.15)"/>
    <text x="122" y="94" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="rgba(255,255,255,0.9)">4</text>

    <text x="175" y="95" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="rgba(255,255,255,0.4)">Notes</text>
    <rect x="210" y="83" width="20" height="16" rx="8" fill="rgba(255,255,255,0.08)"/>
    <text x="217" y="94" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">1</text>

    <!-- List items -->
    <!-- Item 1 - Yellow -->
    <rect x="15" y="120" width="270" height="65" rx="8" fill="#1e1e1e"/>
    <circle cx="35" cy="145" r="7" fill="#fef08a"/>
    <text x="52" y="140" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="rgba(255,255,255,0.3)">#1</text>
    <text x="52" y="155" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="rgba(255,255,255,0.85)">JavaScript frameworks have</text>
    <text x="52" y="170" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="rgba(255,255,255,0.85)">revolutionized development</text>

    <!-- Item 2 - Green -->
    <rect x="15" y="195" width="270" height="65" rx="8" fill="#1e1e1e"/>
    <circle cx="35" cy="220" r="7" fill="#86efac"/>
    <text x="52" y="215" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="rgba(255,255,255,0.3)">#2</text>
    <text x="52" y="230" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="rgba(255,255,255,0.85)">CSS Grid and Flexbox</text>
    <text x="52" y="245" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="rgba(255,255,255,0.85)">provide layouts</text>

    <!-- Item 3 - Blue -->
    <rect x="15" y="270" width="270" height="65" rx="8" fill="#1e1e1e"/>
    <circle cx="35" cy="295" r="7" fill="#93c5fd"/>
    <text x="52" y="290" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="rgba(255,255,255,0.3)">#3</text>
    <text x="52" y="305" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="rgba(255,255,255,0.85)">Progressive Web Apps</text>
    <text x="52" y="320" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="rgba(255,255,255,0.85)">blur the line</text>

    <!-- Item 4 - Red -->
    <rect x="15" y="345" width="270" height="65" rx="8" fill="#1e1e1e"/>
    <circle cx="35" cy="370" r="7" fill="#fca5a5"/>
    <text x="52" y="365" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="rgba(255,255,255,0.3)">#4</text>
    <text x="52" y="380" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="rgba(255,255,255,0.85)">WebAssembly opens</text>
    <text x="52" y="395" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="rgba(255,255,255,0.85)">new doors</text>

    <!-- Footer buttons -->
    <rect x="15" y="425" width="175" height="36" rx="6" fill="rgba(255,255,255,0.08)"/>
    <text x="48" y="448" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="rgba(255,255,255,0.9)">Export as Markdown</text>

    <rect x="200" y="425" width="85" height="36" rx="6" fill="rgba(239,68,68,0.12)"/>
    <text x="220" y="448" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="rgba(239,68,68,0.9)">Clear All</text>
  </g>

  <!-- Feature highlights at bottom -->
  <g transform="translate(0, 720)">
    <!-- Feature 1 -->
    <g transform="translate(180, 0)">
      <circle cx="24" cy="24" r="18" fill="rgba(255,255,255,0.05)"/>
      <rect x="14" y="17" width="20" height="14" rx="2" fill="#fef08a" opacity="0.8"/>
      <text x="60" y="18" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="600" fill="white">4 Highlight Colors</text>
      <text x="60" y="38" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="rgba(255,255,255,0.4)">Yellow, Green, Blue, Red</text>
    </g>

    <!-- Feature 2 -->
    <g transform="translate(480, 0)">
      <circle cx="24" cy="24" r="18" fill="rgba(255,255,255,0.05)"/>
      <rect x="12" y="14" width="24" height="20" rx="3" fill="rgba(255,255,255,0.8)"/>
      <text x="60" y="18" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="600" fill="white">Sticky Notes</text>
      <text x="60" y="38" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="rgba(255,255,255,0.4)">Draggable &amp; Resizable</text>
    </g>

    <!-- Feature 3 -->
    <g transform="translate(780, 0)">
      <circle cx="24" cy="24" r="18" fill="rgba(255,255,255,0.05)"/>
      <text x="14" y="30" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.8)">.md</text>
      <text x="60" y="18" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="600" fill="white">Markdown Export</text>
      <text x="60" y="38" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="rgba(255,255,255,0.4)">Save all annotations</text>
    </g>

    <!-- Feature 4 -->
    <g transform="translate(1040, 0)">
      <circle cx="24" cy="24" r="18" fill="rgba(255,255,255,0.05)"/>
      <text x="14" y="30" font-family="-apple-system, sans-serif" font-size="14" fill="rgba(255,255,255,0.8)">90d</text>
      <text x="60" y="18" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="600" fill="white">Auto Cleanup</text>
      <text x="60" y="38" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="rgba(255,255,255,0.4)">Older than 90 days</text>
    </g>
  </g>
</svg>
