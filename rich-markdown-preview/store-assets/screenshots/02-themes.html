<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; width: 1280px; height: 800px; overflow: hidden; }

.toolbar { height: 48px; background: #171717; border-bottom: 1px solid #404040; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; }
.toolbar-left { display: flex; align-items: center; gap: 16px; }
.logo { display: flex; align-items: center; gap: 8px; }
.logo-icon { width: 24px; height: 24px; background: #262626; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: #fafafa; font-weight: 900; font-size: 11px; }
.logo-text { font-weight: 600; color: #fff; font-size: 14px; }

.main { display: flex; height: calc(100% - 48px); }
.sidebar { width: 256px; background: #262626; border-right: 1px solid #404040; }
.sidebar-header { padding: 12px; border-bottom: 1px solid #404040; display: flex; gap: 8px; }
.open-btn { flex: 1; padding: 8px 12px; background: #404040; border: none; border-radius: 4px; color: #fafafa; font-size: 13px; }
.refresh-btn { width: 36px; height: 36px; background: #404040; border: none; border-radius: 4px; color: #fafafa; }
.file-tree { padding: 8px 0; }
.tree-item { display: flex; align-items: center; gap: 8px; padding: 6px 12px; font-size: 13px; color: #d4d4d4; }
.tree-item.active { background: #525252; color: #fff; }

.content-area { flex: 1; background: #0d1117; position: relative; }
.tab-bar { height: 36px; background: #262626; border-bottom: 1px solid #404040; display: flex; }
.tab { display: flex; align-items: center; gap: 8px; padding: 0 12px; font-size: 12px; color: #fff; background: #171717; border-right: 1px solid #404040; min-width: 120px; }

.preview-dim { padding: 48px 64px; opacity: 0.3; filter: blur(1px); }
.preview-dim h1 { font-size: 28px; color: #c9d1d9; margin-bottom: 12px; border-bottom: 1px solid #30363d; padding-bottom: 8px; }
.preview-dim p { font-size: 15px; line-height: 1.7; color: #8b949e; margin-bottom: 12px; }

/* Modal overlay */
.modal-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 50; }
.modal { background: #262626; border-radius: 12px; width: 640px; max-height: 700px; overflow: hidden; border: 1px solid #404040; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
.modal-header { padding: 16px; border-bottom: 1px solid #404040; display: flex; align-items: center; justify-content: space-between; }
.modal-header h2 { font-size: 18px; font-weight: 600; color: #fff; }
.modal-close { width: 24px; height: 24px; background: none; border: none; color: #737373; font-size: 18px; cursor: pointer; }
.modal-body { padding: 16px; overflow-y: auto; max-height: 580px; }
.section-title { font-size: 13px; font-weight: 500; color: #a3a3a3; margin-bottom: 8px; margin-top: 16px; }
.section-title:first-child { margin-top: 0; }
.theme-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.theme-btn { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 6px; border: 1px solid #404040; background: none; cursor: pointer; text-align: left; }
.theme-btn.selected { border-color: #a3a3a3; background: rgba(82,82,82,0.3); }
.theme-btn:hover { border-color: #525252; }
.theme-preview { width: 32px; height: 32px; border-radius: 4px; border: 1px solid #525252; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }
.theme-info { display: flex; flex-direction: column; }
.theme-name { font-size: 13px; color: #e5e5e5; font-weight: 500; }
.theme-type { font-size: 11px; color: #737373; }
.modal-footer { padding: 16px; border-top: 1px solid #404040; display: flex; justify-content: flex-end; gap: 8px; }
.btn { padding: 8px 16px; border-radius: 6px; font-size: 13px; border: none; cursor: pointer; }
.btn-ghost { background: none; color: #a3a3a3; border: 1px solid #404040; }
.btn-primary { background: #525252; color: #fff; }
.customize-btn { background: #404040; color: #d4d4d4; border: 1px solid #525252; padding: 6px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; margin-top: 12px; display: flex; align-items: center; gap: 6px; }

.toc { width: 256px; background: #262626; border-left: 1px solid #404040; opacity: 0.3; }
</style>
</head>
<body>
<div class="toolbar">
  <div class="toolbar-left">
    <div class="logo"><div class="logo-icon">M</div><span class="logo-text">Rich Markdown Preview</span></div>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-header"><button class="open-btn">📁 フォルダを開く</button><button class="refresh-btn">↻</button></div>
    <div class="file-tree">
      <div class="tree-item"><span>📂</span> project</div>
      <div class="tree-item active" style="padding-left:28px"><span>📄</span> README.md</div>
      <div class="tree-item" style="padding-left:28px"><span>📄</span> guide.md</div>
    </div>
  </div>

  <div class="content-area">
    <div class="tab-bar"><div class="tab">📄 README.md ✕</div></div>
    <div class="preview-dim">
      <h1>Project Documentation</h1>
      <p>This is a sample markdown file being previewed with the Rich Markdown Preview extension.</p>
      <p>Select a theme from the theme panel to customize the appearance of your preview.</p>
    </div>

    <div class="modal-overlay">
      <div class="modal">
        <div class="modal-header">
          <h2>🎨 テーマ設定</h2>
          <button class="modal-close">✕</button>
        </div>
        <div class="modal-body">
          <div class="section-title">ダークテーマ</div>
          <div class="theme-grid">
            <button class="theme-btn selected">
              <div class="theme-preview" style="background:#0d1117;color:#c9d1d9;">A</div>
              <div class="theme-info"><span class="theme-name">GitHub Dark</span><span class="theme-type">Dark</span></div>
            </button>
            <button class="theme-btn">
              <div class="theme-preview" style="background:#282c34;color:#e06c75;">A</div>
              <div class="theme-info"><span class="theme-name">One Dark</span><span class="theme-type">Dark</span></div>
            </button>
            <button class="theme-btn">
              <div class="theme-preview" style="background:#282a36;color:#ff79c6;">A</div>
              <div class="theme-info"><span class="theme-name">Dracula</span><span class="theme-type">Dark</span></div>
            </button>
            <button class="theme-btn">
              <div class="theme-preview" style="background:#2e3440;color:#88c0d0;">A</div>
              <div class="theme-info"><span class="theme-name">Nord</span><span class="theme-type">Dark</span></div>
            </button>
            <button class="theme-btn">
              <div class="theme-preview" style="background:#272822;color:#f92672;">A</div>
              <div class="theme-info"><span class="theme-name">Monokai</span><span class="theme-type">Dark</span></div>
            </button>
            <button class="theme-btn">
              <div class="theme-preview" style="background:#1a1b26;color:#f7768e;">A</div>
              <div class="theme-info"><span class="theme-name">Tokyo Night</span><span class="theme-type">Dark</span></div>
            </button>
            <button class="theme-btn">
              <div class="theme-preview" style="background:#282828;color:#fb4934;">A</div>
              <div class="theme-info"><span class="theme-name">Gruvbox Dark</span><span class="theme-type">Dark</span></div>
            </button>
            <button class="theme-btn">
              <div class="theme-preview" style="background:#1e1e2e;color:#f38ba8;">A</div>
              <div class="theme-info"><span class="theme-name">Catppuccin Mocha</span><span class="theme-type">Dark</span></div>
            </button>
            <button class="theme-btn">
              <div class="theme-preview" style="background:#0a0e14;color:#ff8f40;">A</div>
              <div class="theme-info"><span class="theme-name">Ayu Dark</span><span class="theme-type">Dark</span></div>
            </button>
            <button class="theme-btn">
              <div class="theme-preview" style="background:#191724;color:#eb6f92;">A</div>
              <div class="theme-info"><span class="theme-name">Rosé Pine</span><span class="theme-type">Dark</span></div>
            </button>
          </div>

          <div class="section-title">ライトテーマ</div>
          <div class="theme-grid">
            <button class="theme-btn">
              <div class="theme-preview" style="background:#ffffff;color:#24292e;border-color:#d0d7de;">A</div>
              <div class="theme-info"><span class="theme-name">GitHub Light</span><span class="theme-type">Light</span></div>
            </button>
            <button class="theme-btn">
              <div class="theme-preview" style="background:#fafafa;color:#e45649;border-color:#d0d7de;">A</div>
              <div class="theme-info"><span class="theme-name">One Light</span><span class="theme-type">Light</span></div>
            </button>
            <button class="theme-btn">
              <div class="theme-preview" style="background:#fdf6e3;color:#268bd2;border-color:#d0d7de;">A</div>
              <div class="theme-info"><span class="theme-name">Solarized Light</span><span class="theme-type">Light</span></div>
            </button>
            <button class="theme-btn">
              <div class="theme-preview" style="background:#f5f5dc;color:#8b4513;border-color:#d0d7de;">A</div>
              <div class="theme-info"><span class="theme-name">Paper</span><span class="theme-type">Light</span></div>
            </button>
          </div>

          <button class="customize-btn">🎨 カスタムテーマを作成</button>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost">キャンセル</button>
          <button class="btn btn-primary">適用</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toc"></div>
</div>
</body>
</html>
