<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canvas Whiteboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 240px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1e1e;
      color: #e0e0e0;
    }
    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #fff;
    }
    .btn {
      width: 100%;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      background: #3b82f6;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .btn:hover {
      background: #2563eb;
    }
    .shortcut {
      margin-top: 12px;
      font-size: 12px;
      color: #9ca3af;
      text-align: center;
    }
    kbd {
      display: inline-block;
      padding: 2px 6px;
      font-family: monospace;
      font-size: 11px;
      background: #374151;
      border-radius: 4px;
      color: #e0e0e0;
    }
  </style>
</head>
<body>
  <h1 data-i18n="popupTitle">Canvas Whiteboard</h1>
  <button class="btn" id="toggleBtn" data-i18n="popupToggle">Toggle Whiteboard</button>
  <p class="shortcut"><span data-i18n="popupShortcut">Shortcut:</span> <kbd>Alt+W</kbd></p>
  <script type="module" src="./index.ts"></script>
</body>
</html>
