<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800">
  <!-- Background -->
  <rect width="1280" height="800" fill="#171717"/>

  <!-- Toolbar -->
  <rect y="0" width="1280" height="48" fill="#171717"/>
  <rect y="48" width="1280" height="1" fill="#404040"/>

  <!-- Logo -->
  <g transform="translate(16, 12)">
    <rect width="24" height="24" rx="4" fill="#262626"/>
    <path d="M3.75 18.75V5.25h4.5l3.5 7 3.5-7h4.5v13.5h-4.5v-9l-3.5 7-3.5-7v9H3.75z" fill="#fafafa" transform="scale(0.5)"/>
  </g>
  <text x="48" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#fafafa">Rich Markdown Preview</text>

  <!-- File name -->
  <text x="180" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#737373">|</text>
  <text x="195" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#a3a3a3">README.md</text>

  <!-- Right toolbar items -->
  <!-- Font selector -->
  <rect x="850" y="10" width="140" height="28" rx="4" fill="#262626"/>
  <text x="870" y="29" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#d4d4d4">Noto Sans JP</text>
  <path d="M970 20l4 4 4-4" stroke="#737373" stroke-width="1.5" fill="none"/>

  <!-- Font size -->
  <text x="1000" y="29" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#a3a3a3">16</text>

  <!-- TOC toggle -->
  <rect x="1040" y="10" width="28" height="28" rx="4" fill="#525252"/>
  <g transform="translate(1048, 18)">
    <line x1="0" y1="0" x2="12" y2="0" stroke="#fafafa" stroke-width="1.5"/>
    <line x1="0" y1="4" x2="12" y2="4" stroke="#fafafa" stroke-width="1.5"/>
    <line x1="0" y1="8" x2="12" y2="8" stroke="#fafafa" stroke-width="1.5"/>
  </g>

  <!-- Theme button -->
  <rect x="1080" y="10" width="120" height="28" rx="4" fill="#262626"/>
  <rect x="1090" y="16" width="16" height="16" rx="2" fill="#1e293b" stroke="#525252"/>
  <text x="1112" y="29" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#d4d4d4">Dark Blue</text>
  <path d="M1180 20l4 4 4-4" stroke="#737373" stroke-width="1.5" fill="none"/>

  <!-- Sidebar -->
  <rect x="0" y="49" width="256" height="751" fill="#262626"/>
  <rect x="256" y="49" width="1" height="751" fill="#404040"/>

  <!-- Open folder button -->
  <rect x="12" y="61" width="180" height="36" rx="4" fill="#404040"/>
  <text x="60" y="84" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#fafafa">フォルダを開く</text>

  <!-- Refresh button -->
  <rect x="200" y="61" width="44" height="36" rx="4" fill="#404040"/>
  <g transform="translate(214, 71)">
    <path d="M1 8A7 7 0 1 0 8 1M1 8V3M1 8H6" stroke="#fafafa" stroke-width="1.5" fill="none"/>
  </g>

  <rect x="0" y="109" width="256" height="1" fill="#404040"/>

  <!-- File tree -->
  <g transform="translate(12, 125)">
    <!-- Folder: docs -->
    <g transform="translate(0, 0)">
      <path d="M4 2l2 2h6a1 1 0 011 1v6a1 1 0 01-1 1H3a1 1 0 01-1-1V3a1 1 0 011-1h1z" fill="none" stroke="#a3a3a3" stroke-width="1"/>
      <text x="20" y="10" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#d4d4d4">docs</text>
    </g>

    <!-- File: README.md (selected) -->
    <g transform="translate(16, 28)">
      <rect x="-8" y="-4" width="220" height="24" rx="4" fill="#525252"/>
      <path d="M4 2h5l3 3v7a1 1 0 01-1 1H4a1 1 0 01-1-1V3a1 1 0 011-1z" fill="none" stroke="#fafafa" stroke-width="1"/>
      <text x="20" y="10" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#fafafa">README.md</text>
    </g>

    <!-- File: CHANGELOG.md -->
    <g transform="translate(16, 56)">
      <path d="M4 2h5l3 3v7a1 1 0 01-1 1H4a1 1 0 01-1-1V3a1 1 0 011-1z" fill="none" stroke="#a3a3a3" stroke-width="1"/>
      <text x="20" y="10" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#d4d4d4">CHANGELOG.md</text>
    </g>

    <!-- File: CONTRIBUTING.md -->
    <g transform="translate(16, 84)">
      <path d="M4 2h5l3 3v7a1 1 0 01-1 1H4a1 1 0 01-1-1V3a1 1 0 011-1z" fill="none" stroke="#a3a3a3" stroke-width="1"/>
      <text x="20" y="10" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#d4d4d4">CONTRIBUTING.md</text>
    </g>

    <!-- File: LICENSE.md -->
    <g transform="translate(16, 112)">
      <path d="M4 2h5l3 3v7a1 1 0 01-1 1H4a1 1 0 01-1-1V3a1 1 0 011-1z" fill="none" stroke="#a3a3a3" stroke-width="1"/>
      <text x="20" y="10" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#d4d4d4">LICENSE.md</text>
    </g>
  </g>

  <!-- Main content area -->
  <rect x="257" y="49" width="767" height="751" fill="#1e293b"/>

  <!-- Markdown content -->
  <g transform="translate(320, 100)">
    <!-- H1 -->
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#f8fafc">Rich Markdown Preview</text>
    <rect x="0" y="16" width="640" height="1" fill="#374151"/>

    <!-- Intro paragraph -->
    <text x="0" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#e2e8f0">ローカルのMarkdownファイルを美しくプレビューするChrome拡張機能です。</text>
    <text x="0" y="84" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#e2e8f0">カスタマイズ可能なテーマ、フォント選択、目次の自動生成に対応。</text>

    <!-- H2 -->
    <text x="0" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#f1f5f9">主な機能</text>
    <rect x="0" y="156" width="640" height="1" fill="#374151"/>

    <!-- List items -->
    <g transform="translate(0, 190)">
      <circle cx="8" cy="6" r="3" fill="#60a5fa"/>
      <text x="24" y="10" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#e2e8f0">美しいプレビュー - Markdownを見やすく表示</text>
    </g>
    <g transform="translate(0, 220)">
      <circle cx="8" cy="6" r="3" fill="#60a5fa"/>
      <text x="24" y="10" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#e2e8f0">カスタマイズ可能なテーマ - ダーク/ライトモード対応</text>
    </g>
    <g transform="translate(0, 250)">
      <circle cx="8" cy="6" r="3" fill="#60a5fa"/>
      <text x="24" y="10" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#e2e8f0">フォント選択 - 6種類のフォントから選択可能</text>
    </g>
    <g transform="translate(0, 280)">
      <circle cx="8" cy="6" r="3" fill="#60a5fa"/>
      <text x="24" y="10" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#e2e8f0">目次の自動生成 - スクロール位置をハイライト</text>
    </g>

    <!-- H2 -->
    <text x="0" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#f1f5f9">インストール</text>
    <rect x="0" y="366" width="640" height="1" fill="#374151"/>

    <!-- Code block -->
    <rect x="0" y="390" width="640" height="80" rx="8" fill="#0f172a"/>
    <text x="16" y="420" font-family="monospace" font-size="14" fill="#e2e8f0">$ git clone https://github.com/user/markdown-preview</text>
    <text x="16" y="444" font-family="monospace" font-size="14" fill="#e2e8f0">$ cd markdown-preview</text>
    <text x="16" y="468" font-family="monospace" font-size="14" fill="#e2e8f0">$ npm install &amp;&amp; npm run build</text>

    <!-- H2 -->
    <text x="0" y="530" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#f1f5f9">使い方</text>
    <rect x="0" y="546" width="640" height="1" fill="#374151"/>

    <!-- Numbered list -->
    <text x="0" y="580" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#e2e8f0">1. 拡張機能のアイコンをクリック</text>
    <text x="0" y="608" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#e2e8f0">2. 「フォルダを開く」からフォルダを選択</text>
    <text x="0" y="636" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#e2e8f0">3. ファイルを選択してプレビュー</text>
  </g>

  <!-- TOC Sidebar -->
  <rect x="1024" y="49" width="256" height="751" fill="rgba(38,38,38,0.5)"/>
  <rect x="1024" y="49" width="1" height="751" fill="#404040"/>

  <!-- TOC Header -->
  <rect x="1024" y="49" width="256" height="40" fill="transparent"/>
  <g transform="translate(1044, 58)">
    <path d="M14 7l-7 7-7-7m14 7l-7 7-7-7" stroke="#737373" stroke-width="1.5" fill="none" transform="rotate(180, 7, 10.5)"/>
  </g>
  <rect x="1024" y="89" width="256" height="1" fill="#404040"/>

  <text x="1036" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#737373" letter-spacing="1">目次</text>

  <!-- TOC Items -->
  <g transform="translate(1036, 145)">
    <!-- Active item -->
    <rect x="-4" y="-6" width="210" height="28" rx="4" fill="#525252"/>
    <text x="8" y="10" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#fafafa">Rich Markdown Preview</text>

    <text x="8" y="46" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#d4d4d4">主な機能</text>
    <text x="8" y="78" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#d4d4d4">インストール</text>
    <text x="8" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#d4d4d4">使い方</text>
    <text x="8" y="142" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#d4d4d4">ライセンス</text>
  </g>
</svg>
